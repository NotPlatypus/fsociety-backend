<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dashboard | FSociety Admin</title>
<meta name="robots" content="noindex, nofollow">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0A0A0A;--surface:#111111;--surface-2:#1A1A1A;--text:#FFFFFF;
  --muted:#888888;--primary:#E01B1B;--green:#00FF41;--border:#222222;
  --font:'Share Tech Mono','Courier New',monospace;--radius:8px;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;-webkit-font-smoothing:antialiased;}

/* HEADER */
header{background:#050505;border-bottom:1px solid var(--border);padding:0 20px;position:sticky;top:0;z-index:10;}
.hdr{max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:60px;}
.logo{font-size:1rem;color:var(--primary);font-weight:700;letter-spacing:2px;}
.logo span{color:var(--muted);}
.hdr-right{display:flex;align-items:center;gap:16px;}
.status-dot{width:8px;height:8px;background:var(--green);border-radius:50%;display:inline-block;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
.logout-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:7px 14px;border-radius:6px;font-family:var(--font);font-size:0.78rem;cursor:pointer;transition:all 0.2s;-webkit-tap-highlight-color:transparent;}
.logout-btn:hover{border-color:var(--primary);color:var(--primary);}

/* LAYOUT */
main{max-width:1400px;margin:0 auto;padding:28px 20px 60px;}
.page-title{font-size:0.72rem;color:var(--muted);margin-bottom:24px;}
.page-title span{color:var(--green);}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:28px;}
@media(min-width:640px){.stats-row{grid-template-columns:repeat(4,1fr);}}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;}
.stat-label{font-size:0.68rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:8px;}
.stat-val{font-size:1.8rem;font-weight:700;line-height:1;}
.stat-card.total .stat-val{color:var(--text);}
.stat-card.pending .stat-val{color:#F59E0B;}
.stat-card.confirmed .stat-val{color:var(--green);}
.stat-card.cancelled .stat-val{color:var(--primary);}

/* FILTERS */
.filter-row{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
.filter-btn{background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:8px 16px;border-radius:6px;font-family:var(--font);font-size:0.78rem;cursor:pointer;transition:all 0.2s;text-transform:uppercase;letter-spacing:0.08em;-webkit-tap-highlight-color:transparent;}
.filter-btn:hover{border-color:var(--muted);}
.filter-btn.active{border-color:var(--primary);color:var(--primary);background:rgba(224,27,27,0.06);}

/* BOOKINGS */
.bookings-grid{display:grid;grid-template-columns:1fr;gap:12px;}
@media(min-width:900px){.bookings-grid{grid-template-columns:1fr 1fr;}}
@media(min-width:1280px){.bookings-grid{grid-template-columns:repeat(3,1fr);}}

.booking-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;transition:border-color 0.2s;}
.booking-card.pending{border-left:3px solid #F59E0B;}
.booking-card.confirmed{border-left:3px solid var(--green);}
.booking-card.cancelled{border-left:3px solid var(--primary);opacity:0.6;}

.bc-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;gap:8px;}
.bc-name{font-size:0.95rem;font-weight:700;}
.bc-id{font-size:0.68rem;color:var(--muted);}
.status-badge{font-size:0.62rem;padding:3px 10px;border-radius:4px;text-transform:uppercase;letter-spacing:0.1em;font-weight:700;flex-shrink:0;}
.badge-pending{background:rgba(245,158,11,0.12);color:#F59E0B;border:1px solid rgba(245,158,11,0.3);}
.badge-confirmed{background:rgba(0,255,65,0.08);color:var(--green);border:1px solid rgba(0,255,65,0.3);}
.badge-cancelled{background:rgba(224,27,27,0.08);color:var(--primary);border:1px solid rgba(224,27,27,0.3);}

.bc-row{display:flex;gap:8px;font-size:0.82rem;margin-bottom:6px;align-items:flex-start;}
.bc-row-label{color:var(--muted);flex-shrink:0;width:70px;}
.bc-row-val{color:var(--text);word-break:break-word;}
.bc-divider{border:none;border-top:1px solid var(--border);margin:14px 0;}

.bc-actions{display:flex;gap:8px;}
.bc-btn{flex:1;display:flex;align-items:center;justify-content:center;padding:8px 12px;border-radius:6px;font-family:var(--font);font-size:0.75rem;font-weight:700;letter-spacing:0.05em;cursor:pointer;border:1px solid;transition:all 0.15s;min-height:36px;text-transform:uppercase;-webkit-tap-highlight-color:transparent;}
.bc-btn:disabled{opacity:0.4;cursor:not-allowed;}
.btn-confirm{background:rgba(0,255,65,0.06);border-color:rgba(0,255,65,0.3);color:var(--green);}
.btn-confirm:hover:not(:disabled){background:rgba(0,255,65,0.12);}
.btn-cancel{background:rgba(224,27,27,0.06);border-color:rgba(224,27,27,0.3);color:var(--primary);}
.btn-cancel:hover:not(:disabled){background:rgba(224,27,27,0.12);}

/* BLOCKED DATES */
.section-divider{border:none;border-top:1px solid var(--border);margin:40px 0;}
.section-title{font-size:0.78rem;text-transform:uppercase;letter-spacing:0.12em;color:var(--primary);margin-bottom:16px;}
.section-title::before{content:'> ';}
.block-form{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.block-input{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:var(--font);font-size:16px;padding:10px 14px;min-height:44px;flex:1;min-width:130px;transition:border-color 0.2s;}
.block-input:focus{outline:none;border-color:var(--primary);}
.block-btn{background:var(--primary);color:#fff;border:none;border-radius:var(--radius);font-family:var(--font);font-size:0.82rem;padding:10px 18px;cursor:pointer;font-weight:700;transition:background 0.2s;min-height:44px;-webkit-tap-highlight-color:transparent;}
.block-btn:hover{background:#B01515;}
.blocked-list{display:flex;flex-direction:column;gap:8px;}
.blocked-item{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;gap:12px;}
.blocked-item-date{font-size:0.88rem;}
.blocked-item-reason{font-size:0.78rem;color:var(--muted);flex:1;}
.unblock-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:5px 12px;border-radius:6px;font-family:var(--font);font-size:0.72rem;cursor:pointer;transition:all 0.2s;-webkit-tap-highlight-color:transparent;}
.unblock-btn:hover{border-color:var(--primary);color:var(--primary);}

/* EMPTY STATE */
.empty{text-align:center;padding:48px 20px;color:var(--muted);font-size:0.85rem;}
.empty-icon{font-size:2rem;margin-bottom:12px;opacity:0.5;}

/* LOADING */
.loading{text-align:center;padding:40px;color:var(--muted);font-size:0.85rem;}
.loading::after{content:'...';animation:dots 1s steps(4,end) infinite;}
@keyframes dots{0%,20%{content:'';}40%{content:'.';}60%{content:'..';}80%,100%{content:'...'}}
</style>
</head>
<body>

<header>
  <div class="hdr">
    <div class="logo">FSociety<span>.admin</span></div>
    <div class="hdr-right">
      <span style="font-size:0.72rem;color:var(--muted);">
        <span class="status-dot"></span> ONLINE
      </span>
      <button class="logout-btn" id="logout-btn">Logout</button>
    </div>
  </div>
</header>

<main>
  <div class="page-title"><span>root@fsociety:~$</span> cat bookings.db</div>

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-card total">
      <div class="stat-label">Total</div>
      <div class="stat-val" id="stat-total">—</div>
    </div>
    <div class="stat-card pending">
      <div class="stat-label">Pending</div>
      <div class="stat-val" id="stat-pending">—</div>
    </div>
    <div class="stat-card confirmed">
      <div class="stat-label">Confirmed</div>
      <div class="stat-val" id="stat-confirmed">—</div>
    </div>
    <div class="stat-card cancelled">
      <div class="stat-label">Cancelled</div>
      <div class="stat-val" id="stat-cancelled">—</div>
    </div>
  </div>

  <!-- FILTERS -->
  <div class="filter-row">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="PENDING">Pending</button>
    <button class="filter-btn" data-filter="CONFIRMED">Confirmed</button>
    <button class="filter-btn" data-filter="CANCELLED">Cancelled</button>
  </div>

  <!-- BOOKINGS -->
  <div class="bookings-grid" id="bookings-grid">
    <div class="loading">Loading bookings</div>
  </div>

  <!-- BLOCKED DATES -->
  <hr class="section-divider">
  <div class="section-title">Block a Date</div>
  <div class="block-form">
    <input type="date" class="block-input" id="block-date-input">
    <input type="text" class="block-input" id="block-reason-input" placeholder="Reason (optional)">
    <button class="block-btn" id="block-btn">Block Date</button>
  </div>
  <div class="section-title" style="margin-top:24px;">Blocked Dates</div>
  <div class="blocked-list" id="blocked-list">
    <div class="loading">Loading</div>
  </div>
</main>

<script>
// ── AUTH CHECK ────────────────────────────────────────────────────
fetch('/api/admin/check', { credentials: 'include' })
  .then(r => r.json())
  .then(d => { if (!d.loggedIn) location.href = '/admin.html'; })
  .catch(() => location.href = '/admin.html');

// ── LOGOUT ────────────────────────────────────────────────────────
document.getElementById('logout-btn').addEventListener('click', async () => {
  await fetch('/api/admin/logout', { method: 'POST', credentials: 'include' });
  location.href = '/admin.html';
});

// ── STATE ─────────────────────────────────────────────────────────
let allBookings = [];
let activeFilter = 'all';

// ── LOAD DATA ─────────────────────────────────────────────────────
async function loadBookings() {
  try {
    const res = await fetch('/api/admin/bookings', { credentials: 'include' });
    if (!res.ok) { location.href = '/admin.html'; return; }
    allBookings = await res.json();
    updateStats();
    renderBookings();
  } catch (e) {
    document.getElementById('bookings-grid').innerHTML = '<div class="empty"><div class="empty-icon">⚠</div>Failed to load bookings</div>';
  }
}

function updateStats() {
  document.getElementById('stat-total').textContent     = allBookings.length;
  document.getElementById('stat-pending').textContent   = allBookings.filter(b => b.status === 'PENDING').length;
  document.getElementById('stat-confirmed').textContent = allBookings.filter(b => b.status === 'CONFIRMED').length;
  document.getElementById('stat-cancelled').textContent = allBookings.filter(b => b.status === 'CANCELLED').length;
}

function renderBookings() {
  const filtered = activeFilter === 'all' ? allBookings : allBookings.filter(b => b.status === activeFilter);
  const grid = document.getElementById('bookings-grid');

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty"><div class="empty-icon">[ ]</div>No bookings found</div>';
    return;
  }

  grid.innerHTML = filtered.map(b => {
    const statusClass = b.status.toLowerCase();
    const badgeClass = 'badge-' + statusClass;
    const isPending = b.status === 'PENDING';
    const isCancelled = b.status === 'CANCELLED';

    return `
      <div class="booking-card ${statusClass}" id="card-${b.id}">
        <div class="bc-header">
          <div>
            <div class="bc-name">${esc(b.name)}</div>
            <div class="bc-id">#${b.id} · ${new Date(b.createdAt).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</div>
          </div>
          <span class="status-badge ${badgeClass}">${b.status}</span>
        </div>
        <div class="bc-row"><span class="bc-row-label">Service</span><span class="bc-row-val">${esc(b.serviceType)}</span></div>
        <div class="bc-row"><span class="bc-row-label">Date</span><span class="bc-row-val">${esc(b.date)} @ ${esc(b.time)}</span></div>
        <div class="bc-row"><span class="bc-row-label">Email</span><span class="bc-row-val">${esc(b.email)}</span></div>
        <div class="bc-row"><span class="bc-row-label">Phone</span><span class="bc-row-val">${esc(b.phone)}</span></div>
        <div class="bc-row"><span class="bc-row-label">Address</span><span class="bc-row-val">${esc(b.address)}</span></div>
        ${b.notes ? `<div class="bc-row"><span class="bc-row-label">Notes</span><span class="bc-row-val">${esc(b.notes)}</span></div>` : ''}
        ${!isCancelled ? `
        <hr class="bc-divider">
        <div class="bc-actions">
          <button class="bc-btn btn-confirm" onclick="confirmBooking(${b.id})" ${!isPending ? 'disabled' : ''}>
            ✓ Confirm
          </button>
          <button class="bc-btn btn-cancel" onclick="cancelBooking(${b.id})" ${isCancelled ? 'disabled' : ''}>
            ✗ Cancel
          </button>
        </div>` : ''}
      </div>
    `;
  }).join('');
}

// ── FILTERS ───────────────────────────────────────────────────────
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', function () {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    activeFilter = this.dataset.filter;
    renderBookings();
  });
});

// ── CONFIRM / CANCEL ──────────────────────────────────────────────
async function confirmBooking(id) {
  if (!confirm('Confirm this booking? A confirmation email will be sent to the client.')) return;
  try {
    const res = await fetch('/api/admin/bookings/' + id + '/confirm', { method: 'PUT', credentials: 'include' });
    if (res.ok) {
      const b = allBookings.find(x => x.id === id);
      if (b) b.status = 'CONFIRMED';
      updateStats(); renderBookings();
    }
  } catch (e) { alert('Error confirming booking'); }
}

async function cancelBooking(id) {
  if (!confirm('Cancel this booking? A cancellation email will be sent to the client.')) return;
  try {
    const res = await fetch('/api/admin/bookings/' + id + '/cancel', { method: 'PUT', credentials: 'include' });
    if (res.ok) {
      const b = allBookings.find(x => x.id === id);
      if (b) b.status = 'CANCELLED';
      updateStats(); renderBookings();
    }
  } catch (e) { alert('Error cancelling booking'); }
}

// ── BLOCKED DATES ─────────────────────────────────────────────────
async function loadBlockedDates() {
  try {
    const res = await fetch('/api/admin/blocked', { credentials: 'include' });
    const dates = await res.json();
    renderBlockedDates(dates);
  } catch (e) {
    document.getElementById('blocked-list').innerHTML = '<div style="color:var(--muted);font-size:0.82rem;">Failed to load</div>';
  }
}

function renderBlockedDates(dates) {
  const list = document.getElementById('blocked-list');
  if (!dates.length) {
    list.innerHTML = '<div style="color:var(--muted);font-size:0.82rem;padding:12px 0;">No dates currently blocked</div>';
    return;
  }
  list.innerHTML = dates.map(d => `
    <div class="blocked-item">
      <span class="blocked-item-date">${d.date}</span>
      <span class="blocked-item-reason">${d.reason ? esc(d.reason) : '—'}</span>
      <button class="unblock-btn" onclick="unblockDate(${d.id})">Unblock</button>
    </div>
  `).join('');
}

document.getElementById('block-btn').addEventListener('click', async () => {
  const date = document.getElementById('block-date-input').value;
  const reason = document.getElementById('block-reason-input').value.trim();
  if (!date) { alert('Please select a date to block.'); return; }
  try {
    const res = await fetch('/api/admin/block', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ date, reason })
    });
    if (res.ok) {
      document.getElementById('block-date-input').value = '';
      document.getElementById('block-reason-input').value = '';
      loadBlockedDates();
    } else {
      const d = await res.json();
      alert(d.error || 'Failed to block date');
    }
  } catch (e) { alert('Error blocking date'); }
});

async function unblockDate(id) {
  if (!confirm('Unblock this date?')) return;
  try {
    const res = await fetch('/api/admin/block/' + id, { method: 'DELETE', credentials: 'include' });
    if (res.ok) loadBlockedDates();
  } catch (e) { alert('Error unblocking date'); }
}

// ── ESCAPE HTML ───────────────────────────────────────────────────
function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── INIT ──────────────────────────────────────────────────────────
loadBookings();
loadBlockedDates();

// Auto-refresh every 60s
setInterval(() => { loadBookings(); loadBlockedDates(); }, 60000);
</script>
</body>
</html>
