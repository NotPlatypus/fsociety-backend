services:
  - type: web
    name: fsociety-backend
    env: node
    region: frankfurt
    buildCommand: npm install && npx prisma generate && npx prisma db push
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: BREVO_SMTP_USER
        sync: false
      - key: BREVO_SMTP_PASS
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD_HASH
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://notplatypus.github.io/fsociety